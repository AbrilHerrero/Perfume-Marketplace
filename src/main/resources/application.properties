spring.application.name=marketplacePerfume

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL connection
# When spring-boot-docker-compose is active, these are auto-configured from compose.yaml.
# They also serve as fallback when Docker Compose support is unavailable.
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/marketplace_perfume
spring.datasource.username=marketplace
spring.datasource.password=marketplace123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

